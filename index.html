<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <link href="beta.css" rel="stylesheet" type="text/css" />
  <style type="text/css">
    #up {
      width: 360px;
      height: 80px;
      text-align: center;
      line-height: 80px;
      font-size: 50px;
      color: #000000;
      font-weight: bold;
      background-color: #ffffff;
    }
    #left {
      width: 50%;
      float: left;
      height: 280px;
      text-align: center;
      line-height: 280px;
      font-size: 50px;
      color: #000000;
      font-weight: bold;
      background-color: #ffffff;
    }
    #right {
      width: 50%;
      height: 280px;
      text-align: center;
      line-height: 280px;
      font-size: 50px;
      color: #000000;
      font-weight: bold;
      background-color: #ffffff;
      float: left;
    }
    #down {
      width: 360px;
      height: 80px;
      text-align: center;
      line-height: 80px;
      font-size: 50px;
      color: #000000;
      font-weight: bold;
      background-color: #ffffff;
    }
  </style>
  <title>Charlie手寫體</title>
</head>
<body>
  <div id="up">
    <charliewrite-title>Charlie手寫體</charliewrite-title><br />
    <charliewrite>歡迎使用Charlie手寫體！</charliewrite>
  </div>
  <div id="left">
    <charliewrite>如果想在網頁內使用，請在網頁頂端加上以下代碼:</charliewrite
    ><br />
    <input
      style="width: 201px; height: 100px"
      type="text"
      disabled="disabled"
      value='&lt;link href="//charlie-moomoo.github.io/CharlieHandwriting/font.css" rel="stylesheet" type="text/css"&gt;'
    />
    <br /><charliewrite
      >將要套用字體的文字用&lt;p&gt;標籤包起來，並且將style屬性設為font-family:
      CharlieHandwriting，讓&lt;p&gt;標籤變成這樣:</charliewrite
    ><br />
    <input
      style="width: 201px; height: 100px"
      type="text"
      disabled="disabled"
      value='&lt;p style="font-family: CharlieHandwriting"&gt&lt;/p&gt;'
    /><br />
    <charliewrite>這樣，字體就套用完成了！</charliewrite>
  </div>
  <div id="right">
    <charliewrite
      >如果想下載字體，<a
        style="
          font-family: CharlieHandwriting;
          font-size: 50px;
          text-decoration: none;
        "
        href="https://github.com/charlie-moomoo/CharlieHandwriting/releases"
        >請點選這裡</a
      ></charliewrite
    >
  </div>
  <div style="clear: both"></div>
  <div id="down">
    <hr />
    <a
      href="about"
      style="
        text-decoration: none;
        font-family: CharlieHandwriting;
        font-size: 50px;
      "
      >關於Charlie手寫體</a
    >
    <br />
    <script language="javascript">
      var Today = new Date();
      document.write(
        "<charliewrite>&copy;" +
          Today.getFullYear() +
          "<br/>CharlieHandwriting</charliewrite>",
      );
    </script>
  </div>
</body>
