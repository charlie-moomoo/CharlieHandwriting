<!doctype html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <link href="beta.css" rel="stylesheet" type="text/css" />
  <style type="text/css">
    #up,
    #down {
      text-align: center;
      font-size: 50px;
      color: #000000;
      font-weight: bold;
      background-color: #ffffff;
    }
    .code {
      width: 100%;
      height: 42px;
      margin: 0;
      overflow-y: scroll;
      font-family: monospace;
    }
  </style>
  <title>Charlie手寫體</title>
</head>
<body>
  <div id="up">
    <charliewrite-title>Charlie手寫體</charliewrite-title><br />
    <charliewrite>歡迎使用Charlie手寫體！</charliewrite>
  </div>
  <div id="left">
    <charliewrite>如果想在網頁內使用，請在網頁頂端加上以下代碼:</charliewrite>
    <pre class="code">
&lt;link href="//charlie-moomoo.github.io/CharlieHandwriting/font.css" rel="stylesheet" type="text/css"&gt;</pre
    >
    <charliewrite
      >將要套用字體的文字之font-family樣式屬性設為CharlieHandwriting，讓標籤變成像這樣:</charliewrite
    >
    <pre class="code">
&lt;p style="font-family: CharlieHandwriting"&gt&lt;/p&gt;</pre
    >
    <charliewrite>這樣，字體就套用完成了！</charliewrite>
  </div>
  <div id="right">
    <charliewrite
      >如果想下載字體，<a
        style="
          font-family: CharlieHandwriting;
          font-size: 50px;
          text-decoration: none;
        "
        href="https://github.com/charlie-moomoo/CharlieHandwriting/releases"
        >請點選這裡</a
      ></charliewrite
    >
  </div>
  <div style="clear: both"></div>
  <div id="down">
    <hr />
    <a
      href="about"
      style="
        text-decoration: none;
        font-family: CharlieHandwriting;
        font-size: 50px;
      "
      >關於Charlie手寫體</a
    >
    <br />
    <script language="javascript">
      var Today = new Date();
      document.write(
        "<charliewrite>&copy;" +
          Today.getFullYear() +
          "&nbsp;CharlieHandwriting</charliewrite>",
      );
    </script>
  </div>
</body>
